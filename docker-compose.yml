services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./runtime:/app/runtime
    environment:
      - DATABASE_URL=sqlite:///./vulnscope.db
      - LOCALHOST_SCAN_HOST=host.docker.internal
      - THREATSCOPE_AUTH_ENABLED=${THREATSCOPE_AUTH_ENABLED:-true}
      - THREATSCOPE_ENV=${THREATSCOPE_ENV:-development}
      - THREATSCOPE_SESSION_SECRET=${THREATSCOPE_SESSION_SECRET:-}
      - THREATSCOPE_MFA_ENCRYPTION_KEY=${THREATSCOPE_MFA_ENCRYPTION_KEY:-}
      - THREATSCOPE_ALLOWED_ORIGINS=${THREATSCOPE_ALLOWED_ORIGINS:-http://localhost:5173}
      - THREATSCOPE_COOKIE_SECURE=${THREATSCOPE_COOKIE_SECURE:-false}
      - THREATSCOPE_SESSION_HOURS=${THREATSCOPE_SESSION_HOURS:-8}
      - THREATSCOPE_IDLE_MINUTES=${THREATSCOPE_IDLE_MINUTES:-30}
      - THREATSCOPE_LOGIN_MAX_ATTEMPTS=${THREATSCOPE_LOGIN_MAX_ATTEMPTS:-5}
      - THREATSCOPE_LOCKOUT_MINUTES=${THREATSCOPE_LOCKOUT_MINUTES:-15}
      - THREATSCOPE_BOOTSTRAP_ADMIN_USERNAME=${THREATSCOPE_BOOTSTRAP_ADMIN_USERNAME:-}
      - THREATSCOPE_BOOTSTRAP_ADMIN_PASSWORD=${THREATSCOPE_BOOTSTRAP_ADMIN_PASSWORD:-}
      - THREATSCOPE_BOOTSTRAP_ADMIN_DISPLAY_NAME=${THREATSCOPE_BOOTSTRAP_ADMIN_DISPLAY_NAME:-}
      - THREATSCOPE_RUNTIME_DIR=/app/runtime
      - THREATSCOPE_BACKUP_DIR=/app/runtime/backups
      - THREATSCOPE_EXPORT_DIR=/app/runtime/exports
      - THREATSCOPE_RELEASE_DIR=/app/runtime/releases
      - THREATSCOPE_BACKUP_ENCRYPTION_KEY=${THREATSCOPE_BACKUP_ENCRYPTION_KEY:-}
      - THREATSCOPE_REQUIRE_BACKUP_ENCRYPTION=${THREATSCOPE_REQUIRE_BACKUP_ENCRYPTION:-false}
      - THREATSCOPE_MAX_BACKUP_BYTES=${THREATSCOPE_MAX_BACKUP_BYTES:-2147483648}
      - THREATSCOPE_MAX_IMPORT_BYTES=${THREATSCOPE_MAX_IMPORT_BYTES:-104857600}
      - THREATSCOPE_BACKUP_MAX_COUNT=${THREATSCOPE_BACKUP_MAX_COUNT:-20}
      - THREATSCOPE_BACKUP_MAX_AGE_DAYS=${THREATSCOPE_BACKUP_MAX_AGE_DAYS:-90}
      - THREATSCOPE_BACKUP_MIN_KEEP=${THREATSCOPE_BACKUP_MIN_KEEP:-3}
      - THREATSCOPE_DEMO_MODE=${THREATSCOPE_DEMO_MODE:-false}
      - THREATSCOPE_APP_VERSION=${THREATSCOPE_APP_VERSION:-1.0.0-rc1}
      - THREATSCOPE_BUILD_COMMIT=${THREATSCOPE_BUILD_COMMIT:-development}
      - THREATSCOPE_BUILD_TIMESTAMP=${THREATSCOPE_BUILD_TIMESTAMP:-local-development}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/live', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  test-target:
    build: ./test-target
    ports:
      - "8081:8080"
